# Render Blueprint — https://render.com/docs/blueprint-spec
# New → Blueprint no dashboard e escolhe este repositório.
#
# Variáveis pedidas na 1.ª vez: JWT_SECRET, JWT_REFRESH_SECRET, ENCRYPTION_KEY (sync: false).
# Confirma no painel as URLs .onrender.com; se forem diferentes, ajusta FRONTEND_URL e VITE_API_URL.

version: "1"

databases:
  - name: roboauto-postgres
    region: frankfurt
    plan: free
    databaseName: roboauto

services:
  - type: keyvalue
    name: roboauto-cache
    region: frankfurt
    plan: free
    maxmemoryPolicy: noeviction
    ipAllowList:
      - source: 0.0.0.0/0
        description: Acesso (Render Key Value exige lista; restrinja depois se quiser)

  - type: web
    name: robo-auto-api
    runtime: node
    region: frankfurt
    plan: free
    rootDir: backend
    # NODE_ENV=production no painel faz `npm ci` saltar devDependencies → `tsc` falha. Força dev deps no build.
    buildCommand: NPM_CONFIG_PRODUCTION=false npm ci && npx prisma generate && npm run build
    startCommand: npx prisma migrate deploy && npm run start
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: roboauto-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: roboauto-cache
          property: connectionString
      - key: JWT_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: ENCRYPTION_KEY
        sync: false
      - key: FRONTEND_URL
        value: https://robo-auto-web.onrender.com
      - key: BULLEX_PLATFORM_ID
        value: "580"

  # Static sites na Render não aceitam `region` nem `plan` no Blueprint.
  - type: web
    name: robo-auto-web
    runtime: static
    rootDir: frontend
    buildCommand: NPM_CONFIG_PRODUCTION=false npm ci && npm run build
    staticPublishPath: ./dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://robo-auto-api.onrender.com
